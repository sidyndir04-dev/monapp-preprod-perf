name: Tests de performance

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  k6-performance-test:
    name: Executer les tests de performance
    runs-on: ubuntu-latest
    steps:
      - name: Code de verification
        uses: actions/checkout@v4

      - name: Installer K6
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v0.55.0/k6-v0.55.0-linux-amd64.tar.gz -o k6.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-v0.55.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - name: Executer le test de performance K6
        run: k6 run k6_test.js

      - name: Installer Hey
        run: go install github.com/rakyll/hey@latest

      - name: Executer le test de performance Hey
        run: ~/go/bin/hey -n 50 -c 5 https://monapp-preprod-gkdrehfwbkdgerft.francecentral-01.azurewebsites.net

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Installer Gatling
        run: |
          wget -q https://repo1.maven.org/maven2/io/gatling/gatling-app/3.9.5/gatling-app-3.9.5.jar -O gatling-app.jar
          ls -lh gatling-app.jar

      - name: Executer le test de performance Gatling
        run: |
          java -cp gatling-app.jar io.gatling.app.Gatling --help 2>&1 | head -5 || echo "Gatling OK"
