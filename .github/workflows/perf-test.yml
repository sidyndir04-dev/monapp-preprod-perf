name: Tests de performance

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  k6-performance-test:
    name: Executer les tests de performance
    runs-on: ubuntu-latest
    steps:
      - name: Code de verification
        uses: actions/checkout@v4

      - name: Installer K6
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v0.55.0/k6-v0.55.0-linux-amd64.tar.gz -o k6.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-v0.55.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - name: Executer le test de performance K6
        run: k6 run k6_test.js

      - name: Installer Hey
        run: go install github.com/rakyll/hey@latest

      - name: Executer le test de performance Hey
        run: ~/go/bin/hey -n 50 -c 5 https://monapp-preprod-gkdrehfwbkdgerft.francecentral-01.azurewebsites.net

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Creer projet Gatling Maven
        run: |
          mkdir -p gatling-mvn/src/test/scala/perf
          printf '%s\n' '<project xmlns="http://maven.apache.org/POM/4.0.0"' \
            'xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"' \
            'xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">' \
            '<modelVersion>4.0.0</modelVersion>' \
            '<groupId>com.perf</groupId>' \
            '<artifactId>gatling-test</artifactId>' \
            '<version>1.0</version>' \
            '<dependencies><dependency>' \
            '<groupId>io.gatling.highcharts</groupId>' \
            '<artifactId>gatling-charts-highcharts</artifactId>' \
            '<version>3.9.5</version><scope>test</scope>' \
            '</dependency></dependencies>' \
            '<build><plugins>' \
            '<plugin><groupId>net.alchim31.maven</groupId>' \
            '<artifactId>scala-maven-plugin</artifactId>' \
            '<version>4.8.1</version>' \
            '<executions><execution><goals><goal>testCompile</goal></goals></execution></executions>' \
            '</plugin>' \
            '<plugin><groupId>io.gatling</groupId>' \
            '<artifactId>gatling-maven-plugin</artifactId>' \
            '<version>4.3.7</version>' \
            '<configuration><simulationClass>perf.PerfSimulation</simulationClass></configuration>' \
            '</plugin></plugins></build></project>' \
            > gatling-mvn/pom.xml
          printf '%s\n' 'package perf' \
            'import io.gatling.core.Predef._' \
            'import io.gatling.http.Predef._' \
            'import scala.concurrent.duration._' \
            'class PerfSimulation extends Simulation {' \
            '  val httpConf = http.baseUrl("https://monapp-preprod-gkdrehfwbkdgerft.francecentral-01.azurewebsites.net")' \
            '  val scn = scenario("PerfTest").exec(http("Home").get("/"))' \
            '  setUp(scn.inject(atOnceUsers(5))).protocols(httpConf)' \
            '    .assertions(global.responseTime.max.lt(5000), global.successfulRequests.percent.gt(95))' \
            '}' \
            > gatling-mvn/src/test/scala/perf/PerfSimulation.scala

      - name: Executer le test de performance Gatling
        run: |
          cd gatling-mvn
          mvn gatling:test --batch-mode 2>&1 | tail -30
