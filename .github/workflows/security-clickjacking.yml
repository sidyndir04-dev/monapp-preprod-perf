# =================================================================
# WORKFLOW CI/CD - Test de securite Clickjacking (OWASP A05:2021)
# VERSION FINALE - CORRECTION VALIDEE
# =================================================================
# CE QUE FAIT CE PIPELINE :
#
# JOB 1 - DETECTION (app VULNERABLE) :
#   Demarre app-vulnerable.js (SANS X-Frame-Options)
#   curl -I => confirme l'ABSENCE du header
#   ZAP scanne => detecte WARN-NEW [10020] Missing Anti-clickjacking Header
#   Upload du rapport "rapport-vulnerable"
#
# JOB 2 - CORRECTION (app CORRIGEE avec helmet) :
#   Demarre app-fixed.js (AVEC helmet.frameguard => X-Frame-Options: SAMEORIGIN)
#   curl -I => confirme la PRESENCE du header
#   ZAP scanne => [10020] doit etre PASS (alerte absente)
#   Upload du rapport "rapport-corrige"
#
# LECTURE DU RAPPORT ZAP :
#   Telecharger les artifacts depuis GitHub Actions
#   rapport-vulnerable/report_html.html => voir WARN-NEW [10020]
#   rapport-corrige/report_html.html    => [10020] absent (PASS)
# =================================================================

name: Tests de securite - Clickjacking (OWASP A05:2021)

on:
  push:
    branches: [ main ]
    paths:
      - 'clickjacking/**'
      - '.github/workflows/security-clickjacking.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ================================================================
  # JOB 1 : App VULNERABLE => ZAP doit detecter [10020]
  # ================================================================
  scan-vulnerable:
    name: "Etape 1+2 - Scan ZAP sur app VULNERABLE (detecte [10020])"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation des dependances npm
        run: npm install

      - name: Demarrage de l'app VULNERABLE sur port 3000
        run: |
          node clickjacking/app-vulnerable.js &
          echo "APP_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 10); do
            curl -s http://localhost:3000 > /dev/null 2>&1 && break
            sleep 1
          done
          echo "App vulnerable prete"

      - name: "Verification ABSENCE X-Frame-Options (app vulnerable)"
        run: |
          echo "=== HEADERS HTTP - APP VULNERABLE ==="
          curl -I http://localhost:3000
          echo ""
          if curl -sI http://localhost:3000 | grep -i "x-frame-options"; then
            echo "INATTENDU: header present"
          else
            echo "CONFIRME: X-Frame-Options ABSENT => vulnerable au Clickjacking"
          fi

      - name: Recuperation IP docker0 pour scan ZAP
        run: |
          IP=$(ip route | grep docker0 | awk '{print $9}' | head -1)
          [ -z "$IP" ] && IP="172.17.0.1"
          echo "DOCKER_HOST_IP=$IP" >> $GITHUB_ENV
          echo "IP runner accessible depuis Docker: $IP"
          curl -s http://$IP:3000 | head -3 || true

      - name: "Scan ZAP - App VULNERABLE - doit montrer WARN [10020]"
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://${{ env.DOCKER_HOST_IP }}:3000'
          cmd_options: '-a -j'
          issue_title: 'ZAP Clickjacking vulnerable'
          allow_issue_writing: false
          fail_action: false
        continue-on-error: true

      - name: Upload rapport ZAP - App Vulnerable
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-vulnerable
          path: |
            report_html.html
            report_json.json
          retention-days: 30

      - name: Arret app vulnerable
        if: always()
        run: kill $APP_PID 2>/dev/null || true

  # ================================================================
  # JOB 2 : App CORRIGEE => ZAP ne doit PAS detecter [10020]
  # ================================================================
  scan-fixed:
    name: "Etape 4 - Scan ZAP sur app CORRIGEE (alerte [10020] absente)"
    runs-on: ubuntu-latest
    needs: scan-vulnerable

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation des dependances npm (avec helmet)
        run: npm install

      # app-fixed.js utilise PORT=3001 par defaut
      # On le force a 3000 pour uniformiser avec le scan ZAP
      - name: Demarrage de l'app CORRIGEE (helmet) sur port 3000
        run: |
          PORT=3000 node clickjacking/app-fixed.js &
          echo "FIXED_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 10); do
            curl -s http://localhost:3000 > /dev/null 2>&1 && break
            sleep 1
          done
          echo "App corrigee prete"

      - name: "Verification PRESENCE X-Frame-Options: SAMEORIGIN"
        run: |
          echo "=== HEADERS HTTP - APP CORRIGEE ==="
          curl -I http://localhost:3000
          echo ""
          if curl -sI http://localhost:3000 | grep -i "x-frame-options: sameorigin"; then
            echo "SUCCES: X-Frame-Options: SAMEORIGIN present => CORRECTION VALIDEE"
          else
            echo "ECHEC: header manquant"
            exit 1
          fi
          if curl -sI http://localhost:3000 | grep -i "content-security-policy"; then
            echo "SUCCES: Content-Security-Policy present"
          fi

      - name: Recuperation IP docker0 pour scan ZAP
        run: |
          IP=$(ip route | grep docker0 | awk '{print $9}' | head -1)
          [ -z "$IP" ] && IP="172.17.0.1"
          echo "DOCKER_HOST_IP=$IP" >> $GITHUB_ENV
          echo "IP docker0: $IP"
          curl -sI http://$IP:3000 | grep -i "x-frame-options" || true

      - name: "Scan ZAP - App CORRIGEE - [10020] doit etre PASS"
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://${{ env.DOCKER_HOST_IP }}:3000'
          cmd_options: '-a -j'
          issue_title: 'ZAP Clickjacking corrige'
          allow_issue_writing: false
          fail_action: false
        continue-on-error: true

      - name: Upload rapport ZAP - App Corrigee
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-corrige
          path: |
            report_html.html
            report_json.json
          retention-days: 30

      - name: Arret app corrigee
        if: always()
        run: kill $FIXED_PID 2>/dev/null || true
